<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Life-Cycle Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <h1>⬡ Project Life-Cycle Hub</h1>
    <div class="navbar-right">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        🌙 Dark
      </button>
      <button class="btn btn-primary" onclick="openCreateModal()">
        + New Project
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>My Projects</h2>
    </div>

    <div class="projects-grid" id="projects-grid">
      <div class="empty-state" id="empty-state" style="display:none;">
        <p>No projects yet.</p>
        <button class="btn btn-primary" onclick="openCreateModal()">
          Create your first project
        </button>
      </div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <h3>Create New Project</h3>
      <div class="form-group">
        <label for="project-name">Project Name *</label>
        <input type="text" id="project-name"
          placeholder="e.g. Kigali Rentals" maxlength="100" />
      </div>
      <div class="form-group">
        <label for="project-description">Description</label>
        <textarea id="project-description"
          placeholder="What is this project about?"
          maxlength="500"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeCreateModal()">
          Cancel
        </button>
        <button class="btn btn-primary" onclick="submitCreateProject()">
          Create Project
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:420px;">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:2.5rem; margin-bottom:12px;">🗑️</div>
        <h3 style="margin-bottom:8px;">Delete Project</h3>
        <p id="delete-modal-message"
           style="color:var(--text-secondary); font-size:0.9rem;
                  line-height:1.5;"></p>
      </div>
      <div class="delete-warning">
        ⚠️ This will permanently delete the project, all its stages,
        tasks, milestones, and notes. This cannot be undone.
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">
          Cancel
        </button>
        <button class="btn" id="confirm-delete-btn"
          style="background-color:var(--danger); color:#fff;"
          onclick="executeDeleteProject()">
          Delete Project
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
